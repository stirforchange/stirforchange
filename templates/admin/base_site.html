{% extends "admin/base.html" %}

{% block title %}{{ title }} | StirForChange Admin{% endblock %}

{% block branding %}
<div id="site-name">
  <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;">
    <span style="font-family:Georgia,serif;font-size:1.3rem;font-weight:600;color:#fff;font-style:italic;">
      StirForChange
    </span>
    <span style="font-size:.72rem;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:40px;color:rgba(255,255,255,.9);font-family:sans-serif;font-weight:400;font-style:normal;">
      Admin Panel
    </span>
  </a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  :root {
    --primary:       #B5273A;
    --secondary:     #8D1D2E;
    --accent:        #F2C4CC;
    --primary-fg:    #fff;
  }

  /* Header */
  #header {
    background: var(--primary) !important;
    color: #fff !important;
    padding: 12px 20px !important;
    box-shadow: 0 2px 8px rgba(181,39,58,.3);
  }
  #branding h1 a, #branding h1 a:visited { color:#fff !important; }

  /* Nav / breadcrumbs */
  div.breadcrumbs {
    background: #f9f0f2 !important;
    border-bottom: 1px solid #f2c4cc !important;
    color: #7a3040 !important;
    padding: 8px 20px !important;
    font-size: .85rem !important;
  }
  div.breadcrumbs a { color: var(--primary) !important; }

  /* Module headers */
  .module h2, .module caption, .inline-group h2 {
    background: var(--primary) !important;
    color: #fff !important;
    border-radius: 6px 6px 0 0 !important;
    padding: 10px 14px !important;
    font-size: .9rem !important;
  }

  /* Links */
  a, a:link { color: var(--primary) !important; }
  a:hover { color: var(--secondary) !important; }

  /* Buttons */
  .button, input[type=submit], input[type=button],
  .submit-row input, a.button {
    background: var(--primary) !important;
    color: #fff !important;
    border: none !important;
    border-radius: 6px !important;
    padding: 8px 18px !important;
    font-size: .85rem !important;
    cursor: pointer !important;
  }
  .button:hover, input[type=submit]:hover {
    background: var(--secondary) !important;
  }
  .button.default, input[type=submit].default {
    background: var(--primary) !important;
  }

  /* Delete button */
  .deletelink, a.deletelink {
    background: #c0392b !important;
    color: #fff !important;
    border-radius: 6px !important;
    padding: 8px 18px !important;
  }

  /* Table rows */
  #result_list tr:hover td { background: #fdf2f4 !important; }
  #result_list th { background: #fdf2f4 !important; color: var(--primary) !important; }

  /* Selected checkboxes */
  tr.selected { background: #fce8ec !important; }

  /* Content area */
  #content { padding: 20px !important; }
  #content-main { background: #fff; border-radius: 8px; padding: 0; }

  /* Sidebar */
  #nav-sidebar { background: #fff !important; border-right: 1px solid #f2c4cc !important; }
  .sidebar-title { background: var(--primary) !important; color: #fff !important; padding: 12px 16px !important; font-size: .85rem !important; }
  #nav-sidebar .current-app .section:link,
  #nav-sidebar .current-app .section:visited { color: var(--primary) !important; font-weight: 600 !important; }

  /* Dashboard app list */
  .app-core .model-volunteersignup  a:first-child::before { content: "👤 "; }
  .app-core .model-businesssignup   a:first-child::before { content: "🏪 "; }
  .app-core .model-donationrecord   a:first-child::before { content: "💰 "; }
  .app-core .model-testimonial      a:first-child::before { content: "💬 "; }
  .app-core .model-podcastepisode   a:first-child::before { content: "🎙️ "; }

  /* Form fields */
  input, textarea, select {
    border: 1.5px solid #e8c4cc !important;
    border-radius: 6px !important;
    padding: 8px 10px !important;
    font-size: .9rem !important;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--primary) !important;
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(181,39,58,.1) !important;
  }

  /* Calendar widget */
  .calendarbox, .clockbox { border: 1px solid #f2c4cc !important; }
  .calendar caption, .calendarbox h2 { background: var(--primary) !important; color: #fff !important; }
  td.selected a { background: var(--primary) !important; color: #fff !important; border-radius: 4px !important; }

  /* Object tools */
  .object-tools a {
    background: var(--primary) !important;
    border-radius: 20px !important;
    color: #fff !important;
    padding: 6px 14px !important;
    font-size: .8rem !important;
  }

  /* Messages */
  .messagelist li { border-radius: 6px !important; }
  .messagelist li.success { background: #d4edda !important; color: #155724 !important; border-left: 4px solid #28a745 !important; }
  .messagelist li.error   { background: #fdf2f4 !important; color: var(--primary) !important; border-left: 4px solid var(--primary) !important; }

  /* General cleanup */
  body { font-family: 'Segoe UI', system-ui, sans-serif !important; background: #fdf6f7 !important; }
  fieldset { border: 1px solid #f2c4cc !important; border-radius: 8px !important; padding: 16px !important; }
  fieldset h2 { color: var(--primary) !important; font-size: .85rem !important; }
</style>
{% endblock %}
