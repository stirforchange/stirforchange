{% extends 'core/dash_base.html' %}
{% block title %}Edit Business{% endblock %}
{% block dash_content %}
<div class="dash-card" style="max-width:700px;">
  <div class="dash-card-head"><h3>✏️ Edit Business Partner</h3></div>
  <form method="post" style="padding:1.5rem;">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Business Name</label><input type="text" name="business_name" value="{{ biz.business_name }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">Business Type</label>
        <select name="business_type" class="dash-input">
          {% for val, label in biz.BUSINESS_TYPES %}
          <option value="{{ val }}" {% if biz.business_type == val %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Contact Name</label><input type="text" name="contact_name" value="{{ biz.contact_name }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">Email</label><input type="email" name="email" value="{{ biz.email }}" class="dash-input"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Phone</label><input type="text" name="phone" value="{{ biz.phone }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">Frequency</label><input type="text" name="frequency" value="{{ biz.frequency }}" class="dash-input"></div>
    </div>
    <div class="form-group"><label class="dash-label">Street Address</label><input type="text" name="street_address" value="{{ biz.street_address }}" class="dash-input"></div>
    <div class="form-row">
      <div class="form-group"><label class="dash-label">City</label><input type="text" name="city" value="{{ biz.city }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">State</label><input type="text" name="state" value="{{ biz.state }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">ZIP</label><input type="text" name="zip_code" value="{{ biz.zip_code }}" class="dash-input"></div>
    </div>
    <div class="form-group"><label class="dash-label">Surplus Food Types</label><textarea name="food_types" rows="2" class="dash-input">{{ biz.food_types }}</textarea></div>
    <div class="form-group"><label class="dash-label">Notes</label><textarea name="message" rows="2" class="dash-input">{{ biz.message }}</textarea></div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/dashboard/" class="btn" style="background:var(--pink-bg);color:var(--charcoal);border:1.5px solid var(--border);">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
