{% extends 'core/dash_base.html' %}
{% block title %}Edit Volunteer{% endblock %}
{% block dash_content %}
<div class="dash-card" style="max-width:700px;">
  <div class="dash-card-head"><h3>✏️ Edit Volunteer</h3></div>
  <form method="post" style="padding:1.5rem;">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group"><label class="dash-label">First Name</label><input type="text" name="first_name" value="{{ vol.first_name }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">Last Name</label><input type="text" name="last_name" value="{{ vol.last_name }}" class="dash-input"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Email</label><input type="email" name="email" value="{{ vol.email }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">Phone</label><input type="text" name="phone" value="{{ vol.phone }}" class="dash-input"></div>
    </div>
    <div class="form-group"><label class="dash-label">School / University</label><input type="text" name="school" value="{{ vol.school }}" class="dash-input"></div>
    <div class="form-group"><label class="dash-label">Available Days</label><input type="text" name="avail_days" value="{{ vol.avail_days }}" class="dash-input" placeholder="e.g. monday, wednesday"></div>
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Start Time</label><input type="time" name="avail_start" value="{{ vol.avail_start }}" class="dash-input"></div>
      <div class="form-group"><label class="dash-label">End Time</label><input type="time" name="avail_end" value="{{ vol.avail_end }}" class="dash-input"></div>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="/dashboard/" class="btn" style="background:var(--pink-bg);color:var(--charcoal);border:1.5px solid var(--border);">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
