{% extends 'core/dash_base.html' %}
{% block title %}{% if t %}Edit{% else %}Add{% endif %} Testimonial{% endblock %}
{% block dash_content %}
<div class="dash-card" style="max-width:600px;">
  <div class="dash-card-head"><h3>💬 {% if t %}Edit Testimonial{% else %}Add New Testimonial{% endif %}</h3></div>
  <form method="post" style="padding:1.5rem;">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group"><label class="dash-label">Name *</label><input type="text" name="name" value="{{ t.name|default:'' }}" class="dash-input" required></div>
      <div class="form-group"><label class="dash-label">Role / Title *</label><input type="text" name="role" value="{{ t.role|default:'' }}" class="dash-input" placeholder="e.g. Volunteer, Restaurant Owner" required></div>
    </div>
    <div class="form-group"><label class="dash-label">Quote *</label><textarea name="quote" rows="4" class="dash-input" required placeholder="What they said about StirForChange...">{{ t.quote|default:'' }}</textarea></div>
    <div class="form-group" style="display:flex;align-items:center;gap:.75rem;margin-top:.5rem;">
      <input type="checkbox" name="is_active" id="is_active" {% if not t or t.is_active %}checked{% endif %} style="width:18px;height:18px;accent-color:var(--red);">
      <label for="is_active" style="font-size:.88rem;color:var(--charcoal);cursor:pointer;">Show this testimonial on the website</label>
    </div>
    <div style="display:flex;gap:1rem;margin-top:1.5rem;">
      <button type="submit" class="btn btn-primary">{% if t %}Save Changes{% else %}Add Testimonial{% endif %}</button>
      <a href="/dashboard/" class="btn" style="background:var(--pink-bg);color:var(--charcoal);border:1.5px solid var(--border);">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
